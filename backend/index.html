<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartCrop AI | Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body { margin:0; background:#f6f8fb; font-family:Poppins, system-ui, sans-serif; }
    .layout { display:flex; min-height:100vh; }

    .sidebar { width:260px; background:#157347; color:#fff; padding:20px; }
    .sidebar h4 { font-weight:700; margin-bottom:30px; }
    .menu { list-style:none; padding:0; }
    .menu li { padding:12px 16px; border-radius:10px; margin-bottom:10px; cursor:pointer; display:flex; gap:10px; transition:.2s; }
    .menu li.active, .menu li:hover { background:rgba(255,255,255,.15); transform:translateX(4px); }

    .main { flex:1; padding:20px 30px; position:relative; }

    .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }

    .profile-btn {
      width:40px; height:40px; border-radius:50%;
      background:#22c55e; color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-weight:700; cursor:pointer;
      box-shadow:0 6px 16px rgba(0,0,0,.15);
    }

    .profile-panel {
      position:absolute; right:0; top:52px; width:260px;
      background:#1f2937; color:#fff;
      border-radius:16px; padding:16px;
      box-shadow:0 12px 30px rgba(0,0,0,.35);
      display:none; z-index:10;
    }
    .profile-panel.active { display:block; }
    .profile-panel .title { font-weight:700; }
    .profile-panel .muted { color:#cbd5e1; font-size:14px; }
    .profile-panel hr { border-color:rgba(255,255,255,.15); }

    .logout-btn {
      border:1px solid #ef4444; color:#ef4444; background:transparent;
      border-radius:10px; padding:6px 10px; font-size:12px;
    }

    .card { border:none; border-radius:18px; box-shadow:0 10px 25px rgba(0,0,0,.08); transition:.2s; }
    .card:hover { transform:translateY(-4px); }

    h2 { font-weight:800; letter-spacing:-.5px; color:#1f2937; }

    .sensor-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    .sensor-box { background:#fff; border-radius:16px; padding:14px; text-align:center; box-shadow:0 6px 16px rgba(0,0,0,.08); }
    .sensor-box img { width:42px; height:42px; margin-bottom:6px; }
    .sensor-label { font-size:12px; color:#6b7280; }

    .page { display:none; }
    .page.active { display:block; }
  </style>
</head>

<body>
<div class="layout">

  <aside class="sidebar">
    <h4>🌱 SmartCrop </h4>
    <ul class="menu">
      <li class="active" onclick="showPage('dashboard', this)"><i class="bi bi-speedometer2"></i> Dashboard</li>
      <li onclick="showPage('visualization', this)"><i class="bi bi-graph-up"></i> Visualization</li>
      <li onclick="showPage('advisory', this)"><i class="bi bi-bug"></i> Advisory</li>
    </ul>
  </aside>

  <main class="main">
    <div class="topbar">
      <h3 class="fw-bold mb-0">Dashboard</h3>

      <div style="position:relative">
        <div class="profile-btn" onclick="toggleProfile()">U</div>

        <div id="profilePanel" class="profile-panel">
          <div class="title">Name: <span id="userName">Your Name</span></div>
          <div class="muted">Phone: <span id="userPhone">+91 9XXXXXXXXX</span></div>
          <hr>
          <div class="text-end">
            <button class="logout-btn" onclick="logout()">Logout</button>
          </div>
        </div>
      </div>
    </div>

    <section id="page-dashboard" class="page active">
      <h2 class="mb-3">My Farm ▾</h2>

      <h5 class="fw-semibold mb-2">Live Sensor Data</h5>
      <div class="sensor-grid mb-3">
        <div class="sensor-box">
          <img src="https://cdn-icons-png.flaticon.com/512/728/728093.png">
          <div class="sensor-label">Soil Moisture</div>
          <b id="live_sm">--</b>%
        </div>
        <div class="sensor-box">
          <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png">
          <div class="sensor-label">Temperature</div>
          <b id="live_temp">--</b>°C
        </div>
        <div class="sensor-box">
          <img src="https://cdn-icons-png.flaticon.com/512/728/728110.png">
          <div class="sensor-label">Humidity</div>
          <b id="live_hum">--</b>%
        </div>
        <div class="sensor-box">
          <img src="https://cdn-icons-png.flaticon.com/512/2903/2903628.png">
          <div class="sensor-label">Soil Type</div>
          <b id="live_soil">--</b>
        </div>
      </div>

      <button class="btn btn-success mb-4" onclick="predictFromSensors()">
        <i class="bi bi-magic"></i> Predict from Sensors
      </button>
    </section>

    <section id="page-visualization" class="page">
      <h2 class="fw-bold mb-3">Visualization Trends</h2>
      <div class="card p-4">
        <canvas id="sensorChart"></canvas>
      </div>
    </section>

    <section id="page-advisory" class="page">
      <h2 class="fw-bold mb-3">Disease Advisory</h2>
      <div class="card p-4">
        <p><b>Disease Name:</b> <span id="diseaseName">--</span></p>
        <button class="btn btn-success mb-2" onclick="showFertilizer()">Show Fertilizer</button>
        <div id="fertilizerBox" class="alert alert-info d-none"></div>
      </div>
    </section>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  function showPage(page, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.menu li').forEach(i => i.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    el.classList.add('active');
  }

  function toggleProfile() {
    document.getElementById("profilePanel").classList.toggle("active");
  }

  function logout() {
    fetch('/api/logout', { method:'POST' }).finally(() => location.href = '/');
  }

  function predictFromSensors() {
    alert("Prediction triggered using current sensor values (connect ML API here).");
  }

  function showFertilizer() {
    fertilizerBox.classList.remove("d-none");
    fertilizerBox.textContent = "Recommended Fertilizer/Pesticide will appear here.";
  }

  new Chart(document.getElementById('sensorChart'), {
    type: 'line',
    data: {
      labels: ['10:00','10:05','10:10','10:15'],
      datasets: [
        { label:'Soil Moisture', data:[55,54,56,53], borderColor:'#198754', tension:0 },
        { label:'Temperature', data:[30,31,30,29], borderColor:'#f6b73c', tension:0 },
        { label:'Humidity', data:[60,62,61,63], borderColor:'#0d6efd', tension:0 }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'top' }
      }
    }
  });
</script>
</body>
</html>
